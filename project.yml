name: NextStep
options:
  bundleIdPrefix: com.nextstep.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  NextStep:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NextStep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nextstep.app.NextStep
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES

  NextStepTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NextStepTests
    dependencies:
      - target: NextStep
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  NextStepUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NextStepUITests
    dependencies:
      - target: NextStep
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: NextStep

schemes:
  NextStep:
    build:
      targets:
        NextStep: all
        NextStepTests: [test]
        NextStepUITests: [test]
    test:
      config: Debug
      targets:
        - NextStepTests
        - NextStepUITests
    run:
      config: Debug
    archive:
      config: Release
