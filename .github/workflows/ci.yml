name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Device names on GitHub's runner images change as Xcode/iOS versions are updated, so pick
      # any available iPhone simulator dynamically rather than hard-coding a name that will
      # eventually stop existing and silently break this workflow.
      - name: Find an available iPhone simulator
        id: destination
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for d in devices:
                  if d.get("isAvailable") and "iPhone" in d.get("name", ""):
                      print(d["udid"])
                      sys.exit(0)
          sys.exit(1)
          ')
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run NextStepTests
        run: |
          xcodebuild test \
            -project NextStep.xcodeproj \
            -scheme NextStep \
            -only-testing:NextStepTests \
            -destination "id=${{ steps.destination.outputs.device_id }}"
